<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>测试更新 API</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; }
    input, textarea { width: 100%; padding: 8px; box-sizing: border-box; }
    button { padding: 10px 20px; background: #4CAF50; color: white; border: none; cursor: pointer; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    .result { margin-top: 20px; padding: 10px; border: 1px solid #ccc; }
    .success { background: #d4edda; border-color: #c3e6cb; }
    .error { background: #f8d7da; border-color: #f5c6cb; }
  </style>
</head>
<body>
  <h1>测试更新 API</h1>
  
  <form id="updateForm">
    <div class="form-group">
      <label>版本号:</label>
      <input type="text" id="version" value="1.0.0.1" required>
    </div>
    
    <div class="form-group">
      <label>下载链接:</label>
      <input type="url" id="url" value="https://github.com/example/app.zip" required>
    </div>
    
    <div class="form-group">
      <label>文件大小:</label>
      <input type="number" id="size" value="1048576" min="1" required>
    </div>
    
    <div class="form-group">
      <label>更新日志:</label>
      <textarea id="changelog" required>Test update</textarea>
    </div>
    
    <div class="form-group">
      <label>SHA256:</label>
      <input type="text" id="sha256" value="abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef" required>
    </div>
    
    <button type="submit">提交更新</button>
  </form>
  
  <div class="result" id="result"></div>

  <script>
    const form = document.getElementById('updateForm');
    const result = document.getElementById('result');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const data = {
        version: document.getElementById('version').value,
        url: document.getElementById('url').value,
        size: parseInt(document.getElementById('size').value),
        changelog: document.getElementById('changelog').value,
        sha256: document.getElementById('sha256').value
      };
      
      try {
        const response = await fetch('/api/update', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer test'
          },
          body: JSON.stringify({ data })
        });
        
        const responseData = await response.json();
        
        if (response.ok && responseData.success) {
          result.className = 'result success';
          result.textContent = '更新成功! ' + JSON.stringify(responseData);
        } else {
          result.className = 'result error';
          result.textContent = '更新失败: ' + (responseData.message || '未知错误');
        }
      } catch (error) {
        result.className = 'result error';
        result.textContent = '请求失败: ' + error.message;
      }
    });
  </script>
</body>
</html>
